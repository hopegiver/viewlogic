<div class="login-page">
    <div class="login-card">
        <div class="login-header">
            <span class="login-icon">🔐</span>
            <h2>로그인</h2>
            <p class="text-muted">보호된 페이지에 접근하려면 로그인하세요.</p>
        </div>

        <div v-if="error" class="alert alert-danger">{{ error }}</div>
        <div v-if="redirectRoute" class="alert alert-warning">
            <strong>{{ redirectRoute }}</strong> 페이지는 로그인이 필요합니다.
        </div>

        <form @submit.prevent="handleLogin">
            <div class="mb-3">
                <label class="form-label">아이디</label>
                <input
                    type="text"
                    class="form-control"
                    v-model="username"
                    placeholder="admin"
                    :disabled="isLoading"
                    autofocus
                />
            </div>
            <div class="mb-3">
                <label class="form-label">비밀번호</label>
                <input
                    type="password"
                    class="form-control"
                    v-model="password"
                    placeholder="1234"
                    :disabled="isLoading"
                    @keyup.enter="handleLogin"
                />
            </div>
            <button
                type="submit"
                class="btn btn-primary w-100"
                :disabled="isLoading || !username || !password"
            >
                <span v-if="isLoading" class="spinner-border spinner-border-sm me-2"></span>
                {{ isLoading ? '로그인 중...' : '로그인' }}
            </button>
        </form>

        <div class="login-hint mt-4">
            <small class="text-muted">
                테스트 계정: <code>admin</code> / <code>1234</code>
            </small>
        </div>

        <div class="mt-3 text-center">
            <a @click="navigateTo('home')" class="text-decoration-none" style="cursor:pointer">
                ← 홈으로 돌아가기
            </a>
        </div>
    </div>
</div>
