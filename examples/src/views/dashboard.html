<div class="dashboard-page">
    <h2>📊 대시보드</h2>
    <p class="text-muted">이 페이지는 로그인해야 접근할 수 있는 보호된 페이지입니다.</p>

    <div class="row g-4 mt-2">
        <!-- 인증 상태 카드 -->
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">🔐 인증 상태</div>
                <div class="card-body">
                    <table class="table table-sm mb-0">
                        <tr>
                            <td class="text-muted">로그인 여부</td>
                            <td>
                                <span class="badge" :class="isLoggedIn ? 'bg-success' : 'bg-danger'">
                                    {{ isLoggedIn ? '인증됨' : '미인증' }}
                                </span>
                            </td>
                        </tr>
                        <tr>
                            <td class="text-muted">토큰 존재</td>
                            <td>{{ hasToken ? '있음' : '없음' }}</td>
                        </tr>
                        <tr>
                            <td class="text-muted">토큰 만료</td>
                            <td>{{ tokenExpiry || '-' }}</td>
                        </tr>
                    </table>
                </div>
            </div>
        </div>

        <!-- 토큰 정보 카드 -->
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">🔑 토큰 정보</div>
                <div class="card-body">
                    <div v-if="tokenPayload" class="small">
                        <div><strong>사용자:</strong> {{ tokenPayload.name }}</div>
                        <div><strong>발급 시간:</strong> {{ formatTime(tokenPayload.iat) }}</div>
                        <div><strong>만료 시간:</strong> {{ formatTime(tokenPayload.exp) }}</div>
                    </div>
                    <div v-else class="text-muted">토큰 정보 없음</div>
                </div>
            </div>
        </div>

        <!-- 액션 카드 -->
        <div class="col-12">
            <div class="card">
                <div class="card-header">⚡ 액션</div>
                <div class="card-body d-flex gap-2 flex-wrap">
                    <button class="btn btn-outline-primary btn-sm" @click="refreshStatus">
                        🔄 상태 새로고침
                    </button>
                    <button class="btn btn-outline-danger btn-sm" @click="handleLogout">
                        🚪 로그아웃
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
